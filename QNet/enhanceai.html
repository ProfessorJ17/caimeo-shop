<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ConnectHub — AI Enhanced Feed</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
:root { --bg:#000; --fg:#fff; --muted:#9ca3af; --border:#222; --accent:#fff; --shadow: none; }
* { box-sizing: border-box; }
html, body { margin:0; padding:0; background:var(--bg); color:var(--fg); font-family:'Noto Sans', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
.app-header { position: sticky; top:0; background:var(--bg); border-bottom:1px solid var(--border); z-index:5; }
.brand { display:flex; align-items:center; gap:.6rem; padding:1rem 1.25rem; }
.brand .dot{ width:10px; height:10px; border-radius:50%; background:var(--fg); display:inline-block; }
.brand h1{ font-size:1.1rem; margin:0; font-weight:700; letter-spacing:.3px; }
.brand .sub{ color:var(--muted); font-size:.9rem; }
.container{ max-width:900px; margin:1.25rem auto; padding:0 1rem; display:grid; gap:1rem; }
.panel{ background:#000; border:1px solid var(--border); box-shadow:none; }
.panel h2{ margin:.25rem 0 1rem; font-size:1rem; }
.fields{ display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
label{ display:flex; flex-direction:column; gap:.35rem; font-size:.9rem; color:var(--muted); }
input, select, textarea{ width:100%; padding:.75rem .85rem; border:1px solid var(--border); border-radius:10px; outline:none; background:#000; color:#fff; transition: border-color .15s ease; }
input:focus, select:focus, textarea:focus{ border-color:#c7c9cf; }
textarea{ resize:vertical; min-height:110px; }
.actions{ display:flex; gap:.5rem; margin-top:.75rem; }
.btn{ padding:.6rem .9rem; border:1px solid var(--border); border-radius:10px; background:#fff; color:var(--fg); cursor:pointer; transition: transform .05s ease, border-color .15s ease, background .15s; }
.btn:hover{ border-color:#d5d7de; background:#fcfcfc; }
.btn:active{ transform: translateY(1px); }
.btn.primary{ padding:.6rem .9rem; border-radius:60px; background: linear-gradient(90deg,#4a0e69 0%, #880000 60%); color:#fff; border:none; display:inline-flex; align-items:center; gap:.45rem; }
.btn.primary:hover{ filter:brightness(0.95); }
.btn.subtle{ border:none; background:transparent; color:var(--muted); padding:.3rem .5rem; }
.btn .icon { display:inline-block; vertical-align:middle; margin-right:.45rem; }
.inline-meta { margin-top:.45rem; color:var(--muted); font-size:.88rem; }
.status{ margin-top:.5rem; min-height:1.2rem; color:var(--muted); font-size:.9rem; }
.enhanced{ margin-top:.75rem; border:1px dashed var(--border); border-radius:10px; padding:.75rem; }
.enhanced.hidden{ display:none; }
.enhanced-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:.5rem; color:var(--muted); font-size:.9rem; }
.enhanced-text{ white-space:pre-wrap; line-height:1.5; }
.feed-list{ display:grid; gap:.75rem; }
.post{ border:1px solid var(--border); border-radius:12px; padding:.9rem; background:#000; color:#fff; }
.post-main{ white-space:pre-wrap; line-height:1.55; font-size:1rem; }
.post-meta{ margin-top:.5rem; }
.meta-grid{ display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
.original{ color:var(--muted); white-space:pre-wrap; }
.sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
.AIButton{ width:128px; height:36px; display:flex; align-items:center; justify-content:center; padding:2px 14px; border-radius:60px; position:relative; border:1px solid rgba(255,255,255,0.4); overflow:hidden; cursor:pointer; transition: transform .15s ease, border-color .15s ease; }
.AIButton:active{ transform: scale(0.96); }
.AIButton .ButtonText{ color:#fff; font-family:'Noto Sans', system-ui; font-weight:600; font-size:14px; z-index:2; margin-left:8px; }
.AIButton .ButtonIcon{ z-index:2; }
.AIButton .ButtonMask{ width:220px; height:220px; background: linear-gradient(90deg,#4a0e69 0%, #880000 60%); filter: blur(10px); position:absolute; top:50%; left:50%; transform: translate(-50%,-50%); z-index:1; opacity:.9; animation: rotating 5s linear infinite; }
@keyframes rotating{ from{ transform: translate(-50%,-50%) rotate(0deg);} to{ transform: translate(-50%,-50%) rotate(360deg);} }
@media (max-width:720px){ .fields{ grid-template-columns:1fr; } }
.tuning { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin:.5rem 0; }
.tuning label { display:grid; grid-template-columns:1fr auto; align-items:center; column-gap:.75rem; color:#fff; }
.tuning input[type="range"]{ grid-column:1 / -1; width:100%; }
  </style>
  <meta name="color-scheme" content="light only">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="dot"></span>
      <h1>ConnectHub</h1>
      <span class="sub">AI Enhanced Feed</span>
    </div>
  </header>

  <main class="container">
    <section class="panel config">
      <h2>OpenRouter Settings</h2>
      <div class="fields">
        <label>
          OpenRouter API Key
          <input id="apiKey" type="password" placeholder="sk-or-v1-..." autocomplete="current-password">
        </label>
        <label>
          Model
          <select id="model" autocomplete="off">
            <optgroup label="Free">
              <option value="deepseek_r1_0528">DeepSeek: R1 0528</option>
              <option value="mistral_devstral_small_2505">Mistral: Devstral Small 2505</option>
              <option value="qwen_qwen2.5_coder_32b_instruct">Qwen: Qwen2.5 Coder 32B Instruct</option>
              <option value="google_gemini_2_flash_experimental">Google: Gemini 2.0 Flash Experimental</option>
              <option value="meta_llama_3.1_405b_instruct">Meta: Llama 3.1 405B Instruct</option>
            </optgroup>
            <optgroup label="Premium">
              <option value="anthropic_claude_3.7_sonnet">Anthropic: Claude 3.7 Sonnet</option>
              <option value="openai_gpt_4o">OpenAI: GPT-4o</option>
              <option value="google_gemini_2.5_pro">Google: Gemini 2.5 Pro</option>
              <option value="xai_grok_code_fast_1" selected>xAI: Grok Code Fast 1</option>
              <option value="qwen_qwen3_coder_480b_a35b">Qwen: Qwen3 Coder 480B A35B</option>
            </optgroup>
          </select>
        </label>
      </div>
      <div class="tuning">
        <label>Emojis: <span id="emojiVal">2</span>
          <input id="emojiCount" type="range" min="1" max="6" step="1" value="2">
        </label>
        <label>Sentences: <span id="sentenceVal">2</span>
          <input id="sentenceCount" type="range" min="1" max="3" step="1" value="2">
        </label>
        <label>Hashtags: <span id="tagVal">8</span>
          <input id="tagCount" type="range" min="1" max="25" step="1" value="8">
        </label>
      </div>
      <button id="saveConfig" class="btn primary">Save Config</button>
      <p id="configStatus" class="status"></p>
    </section>

    <section class="panel composer">
      <h2>Compose</h2>
      <label class="sr-only" for="rawInput">What's on your mind? (Raw post)</label>
      <textarea id="rawInput" rows="5" placeholder="What's on your mind? (Raw post)" autocomplete="off"></textarea>
      
      <div class="actions">
        <button id="enhanceBtn" class="btn AIButton">
          <div class="ButtonMask"></div>
          <svg class="ButtonIcon" width="22" height="22" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M7.17903 0.826202C7.11366 0.592438 6.78224 0.592438 6.71687 0.826202L5.85099 3.92225C5.83055 3.99534 5.77674 4.05445 5.70589 4.08164L2.95486 5.13755C2.74957 5.21634 2.74957 5.50679 2.95486 5.58558L5.70589 6.64149C5.77674 6.66868 5.83055 6.72779 5.85099 6.80088L6.71687 9.89693C6.78224 10.1307 7.11366 10.1307 7.17903 9.89693L8.04491 6.80087C8.06535 6.72779 8.11916 6.66868 8.19001 6.64149L10.941 5.58558C11.1463 5.50679 11.1463 5.21634 10.941 5.13755L8.19001 4.08164C8.11916 4.05445 8.06535 3.99534 8.04491 3.92225L7.17903 0.826202Z" fill="white"/>
            <path d="M2.94274 7.6544C2.87623 7.42275 2.54797 7.42275 2.48147 7.6544L2.18902 8.67308C2.16803 8.74617 2.11365 8.80499 2.04242 8.83162L1.05838 9.19956C0.850494 9.27729 0.850494 9.57134 1.05838 9.64907L2.04242 10.017C2.11365 10.0436 2.16803 10.1025 2.18902 10.1755L2.48147 11.1942C2.54797 11.4259 2.87623 11.4259 2.94274 11.1942L3.23519 10.1755C3.25617 10.1025 3.31056 10.0436 3.38179 10.017L4.36582 9.64907C4.57371 9.57134 4.57371 9.27729 4.36582 9.19956L3.38179 8.83162C3.31056 8.80499 3.25617 8.74617 3.23519 8.67308L2.94274 7.6544Z" fill="white"/>
          </svg>
          <p class="ButtonText">Enhance</p>
        </button>
        <button id="postBtn" class="btn primary">Post</button>
      </div>
      <div id="enhancedWrap" class="enhanced hidden">
        <div class="enhanced-head">
          <span>Enhanced preview</span>
          <button id="useRawBtn" class="btn subtle">Use raw instead</button>
        </div>
        <div id="enhancedText" class="enhanced-text"></div>
      </div>
      <p id="enhanceStatus" class="status"></p>
    </section>

    <section class="panel feed">
      <h2>Feed</h2>
      <div id="feedList" class="feed-list" aria-live="polite"></div>
    </section>
  </main>

  <template id="postItemTemplate">
    <article class="post">
      <div class="post-main"></div>
      <div class="inline-meta">
        <span class="time"></span>
      </div>
    </article>
  </template>

  <script type="module">
const AI_ENHANCE_KEY = "ai.enhance";
const OR_KEY = "openrouter.apiKey";
const OR_MODEL_KEY = "openrouter.model";

function getEnhanceSettings() {
  const defaults = {
    emojiCount: localStorage.getItem(`${AI_ENHANCE_KEY}.emojis`) || '2',
    sentenceCount: localStorage.getItem(`${AI_ENHANCE_KEY}.sentences`) || '2',
    tagCount: localStorage.getItem(`${AI_ENHANCE_KEY}.hashtags`) || '8',
    apiKey: localStorage.getItem(OR_KEY) || '',
    model: localStorage.getItem(OR_MODEL_KEY) || 'xai_grok_code_fast_1'
  };
  return defaults;
}

const els = {
  apiKey: document.getElementById("apiKey"),
  model: document.getElementById("model"),
  saveConfig: document.getElementById("saveConfig"),
  configStatus: document.getElementById("configStatus"),
  rawInput: document.getElementById("rawInput"),
  enhanceBtn: document.getElementById("enhanceBtn"),
  postBtn: document.getElementById("postBtn"),
  enhancedWrap: document.getElementById("enhancedWrap"),
  enhancedText: document.getElementById("enhancedText"),
  enhanceStatus: document.getElementById("enhanceStatus"),
  feedList: document.getElementById("feedList"),
  postItemTemplate: document.getElementById("postItemTemplate"),
  useRawBtn: document.getElementById("useRawBtn"),
  emojiCount: document.getElementById("emojiCount"),
  sentenceCount: document.getElementById("sentenceCount"),
  tagCount: document.getElementById("tagCount"),
  emojiVal: document.getElementById("emojiVal"),
  sentenceVal: document.getElementById("sentenceVal"),
  tagVal: document.getElementById("tagVal"),
};

const FEED_KEY = "connecthub-feed-v1";

function loadConfig() {
  const saved = getEnhanceSettings();
  els.apiKey.value = saved.apiKey;
  els.model.value = saved.model;

  // Load slider values
  els.emojiCount.value = saved.emojiCount;
  els.sentenceCount.value = saved.sentenceCount;
  els.tagCount.value = saved.tagCount;

  els.emojiVal.textContent = els.emojiCount.value;
  els.sentenceVal.textContent = els.sentenceCount.value;
  els.tagVal.textContent = els.tagCount.value;
  
  // Ensure model selection is functional upon load, defaulting to Grok Code Fast 1
  if (!els.model.value) {
    els.model.value = 'xai_grok_code_fast_1';
  }
}
function saveConfig() {
  // Save OpenRouter specific keys
  localStorage.setItem(OR_KEY, els.apiKey.value.trim());
  localStorage.setItem(OR_MODEL_KEY, els.model.value);

  // Save enhancement specific keys
  localStorage.setItem(`${AI_ENHANCE_KEY}.emojis`, els.emojiCount.value);
  localStorage.setItem(`${AI_ENHANCE_KEY}.sentences`, els.sentenceCount.value);
  localStorage.setItem(`${AI_ENHANCE_KEY}.hashtags`, els.tagCount.value);
  
  els.configStatus.textContent = "Saved.";
  setTimeout(() => (els.configStatus.textContent = ""), 1200);
}
function loadFeed() {
  try {
    const saved = JSON.parse(localStorage.getItem(FEED_KEY) || "[]");
    saved.forEach(addPostToDOM);
  } catch {}
}
function persistPost(entry) {
  const arr = JSON.parse(localStorage.getItem(FEED_KEY) || "[]");
  arr.unshift(entry);
  localStorage.setItem(FEED_KEY, JSON.stringify(arr));
}

async function enhance(text) {
  const apiKey = els.apiKey.value.trim();
  const model = els.model.value;
  if (!apiKey) {
    els.enhanceStatus.textContent = "Set OpenRouter API key first.";
    return null;
  }
  
  const ec = Number(els.emojiCount.value), sc = Number(els.sentenceCount.value), tc = Number(els.tagCount.value);
  const prompt = `You are an expert social media post enhancer. Your task is to polish the provided raw post text.
Instructions:
- Keep the original meaning and voice.
- Enhance for clarity and engagement.
- Include exactly ${ec} emojis integrated naturally into the text.
- Keep the main post to exactly ${sc} sentences total.
- Append exactly ${tc} relevant, search-friendly hashtags (lowercase, separated by spaces, no duplicates).
Respond ONLY with the enhanced text content, with no introductory phrases or JSON wrappers.`;
  
  try {
    els.enhanceStatus.textContent = "Enhancing…";
    
    const messages = [
      { role: "system", content: prompt },
      { role: "user", content: text },
    ];
    
    const resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`,
        'HTTP-Referer': location.origin,
        'X-Title': 'ConnectHub AI'
      },
      body: JSON.stringify({
        model,
        messages,
        temperature: 0.8
      })
    });
    
    if (!resp.ok) {
      const errorText = await resp.text();
      console.error("OpenRouter API Error:", errorText);
      throw new Error(`API request failed: ${resp.statusText}. Check console for details.`);
    }

    const data = await resp.json();
    const content = data?.choices?.[0]?.message?.content || '';
    
    // Since we instructed the model to respond ONLY with the enhanced text content, we return it directly.
    if (!content) throw new Error("No enhanced text returned.");
    
    return content.trim();

  } catch (e) {
    console.error(e);
    return null;
  } finally {
    els.enhanceStatus.textContent = "";
  }
}

function addPostToDOM({ enhanced, ts }) {
  const node = document.importNode(els.postItemTemplate.content, true);
  node.querySelector(".post-main").textContent = enhanced;
  node.querySelector(".time").textContent = new Date(ts).toLocaleString();
  els.feedList.prepend(node);
}

function showEnhancedPreview(text) {
  els.enhancedText.textContent = text;
  els.enhancedWrap.classList.remove("hidden");
}
function clearEnhancedPreview() {
  els.enhancedText.textContent = "";
  els.enhancedWrap.classList.add("hidden");
}

els.saveConfig.addEventListener("click", saveConfig);

els.enhanceBtn.addEventListener("click", async () => {
  const raw = els.rawInput.value.trim();
  if (!raw) {
    els.enhanceStatus.textContent = "Please enter something to enhance.";
    return;
  }
  els.enhanceBtn.disabled = true;
  els.postBtn.disabled = true;
  const out = await enhance(raw);
  els.enhanceBtn.disabled = false;
  els.postBtn.disabled = false;
  if (out) {
    showEnhancedPreview(out);
  } else {
    els.enhanceStatus.textContent = "Enhancement failed. Posting raw is still possible.";
  }
});

els.useRawBtn.addEventListener("click", () => {
  clearEnhancedPreview();
});

els.postBtn.addEventListener("click", async () => {
  const raw = els.rawInput.value.trim();
  if (!raw) return;

  let enhanced = els.enhancedText.textContent.trim();
  if (!enhanced) {
    els.postBtn.disabled = true;
    els.enhanceStatus.textContent = "Enhancing before posting…";
    enhanced = await enhance(raw);
    els.postBtn.disabled = false;
  }

  const finalText = enhanced || raw;
  const entry = { enhanced: finalText, original: raw, ts: Date.now() };
  addPostToDOM(entry);
  persistPost(entry);

  els.rawInput.value = "";
  clearEnhancedPreview();
  els.enhanceStatus.textContent = "Posted!";
  setTimeout(() => (els.enhanceStatus.textContent = ""), 1000);
});

loadConfig();
loadFeed();

["emojiCount","sentenceCount","tagCount"].forEach(id=>{
  const input = els[id], label = els[id.replace("Count","Val")];
  input.addEventListener("input", ()=> label.textContent = input.value);
});
  </script>
</body>
</html>
